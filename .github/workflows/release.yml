name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run compile

      - name: Check OVSX_TOKEN is set
        run: |
          if [ -z "$OVSX_TOKEN" ]; then
            echo "::error::OVSX_TOKEN secret is not set. Go to Settings → Secrets → Actions and add OVSX_TOKEN."
            echo "::error::Generate a token at https://open-vsx.org/user-settings/tokens"
            exit 1
          fi
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      - name: Validate OVSX_TOKEN
        id: validate_token
        run: |
          if ! npx ovsx verify-pat -p "$OVSX_TOKEN" candelahq 2>/dev/null; then
            echo "ovsx_valid=false" >> "$GITHUB_OUTPUT"
            echo "::error::OVSX_TOKEN is invalid or expired."
            echo "::error::Regenerate at https://open-vsx.org/user-settings/tokens"
            echo "::error::Then update the secret at https://github.com/${{ github.repository }}/settings/secrets/actions"
          else
            echo "ovsx_valid=true" >> "$GITHUB_OUTPUT"
            echo "✅ Open VSX token is valid"
          fi
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      - name: Package VSIX
        if: steps.validate_token.outputs.ovsx_valid == 'true'
        run: npx @vscode/vsce package

      - name: Publish to Open VSX
        if: steps.validate_token.outputs.ovsx_valid == 'true'
        run: npx ovsx publish *.vsix -p "$OVSX_TOKEN"
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      - name: Create GitHub Release
        if: steps.validate_token.outputs.ovsx_valid == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.vsix"

      - name: Comment on failure (token issue)
        if: steps.validate_token.outputs.ovsx_valid == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const body = [
              `## ❌ Release ${tag} failed — Open VSX token issue`,
              '',
              'The `OVSX_TOKEN` secret is **invalid or expired**.',
              '',
              '### Fix:',
              '1. Generate a new token at [open-vsx.org/user-settings/tokens](https://open-vsx.org/user-settings/tokens)',
              `2. Update the secret at [${context.repo.repo} → Settings → Secrets](https://github.com/${context.repo.owner}/${context.repo.repo}/settings/secrets/actions)`,
              '3. Re-run this workflow or push a new tag.',
            ].join('\n');

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });

            core.setFailed('OVSX_TOKEN is invalid or expired. See commit comment for fix instructions.');
